<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Friska Meal Quote</title>

<style>

body{
font-family:system-ui;
background:#f4f6fb;
margin:0;
padding:20px;
display:flex;
justify-content:center;
}

.container{
max-width:500px;
width:100%;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h2{
margin-top:0;
}

.section{
margin-top:25px;
}

.plan-grid{
display:flex;
gap:15px;
margin-top:10px;
}

.plan-card{
flex:1;
border-radius:10px;
overflow:hidden;
cursor:pointer;
border:2px solid transparent;
transition:0.2s;
}

.plan-card img{
width:100%;
display:block;
}

.plan-card.active{
border:2px solid #0a1a6e;
}

.plan-card:hover{
transform:scale(1.03);
box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

label{
display:block;
margin-top:8px;
}

input[type="text"]{
width:100%;
padding:10px;
margin-top:8px;
}

button{
margin-top:30px;
width:100%;
padding:14px;
background:#0a1a6e;
color:white;
border:none;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

.hidden{
display:none;
}

.days{
margin-top:10px;
}

</style>

</head>


<body>

<div class="container">

<h2>Welcome to Friska Wellness</h2>

<p>Select your plan to generate a quote.</p>


<!-- PLAN SELECTION -->

<div class="section">

<h3>Select Plan</h3>

<div class="plan-grid">

<div class="plan-card" onclick="selectPlan(this)">
<img src="nutri_balance.jpeg">
</div>

<div class="plan-card" onclick="selectPlan(this)">
<img src="high_protein.jpeg">
</div>

</div>

</div>


<!-- MEALS -->

<div class="section">

<h3>Select Meals</h3>

<label><input type="checkbox"> Breakfast</label>
<label><input type="checkbox"> Lunch</label>
<label><input type="checkbox"> Dinner</label>
<label><input type="checkbox"> Snack</label>
<label><input type="checkbox"> 1x Juice</label>
<label><input type="checkbox"> 2x Juices</label>

</div>


<!-- DELIVERY SLOT -->

<div class="section">

<h3>Delivery Slot</h3>

<label><input type="checkbox"> Morning</label>
<label><input type="checkbox"> Afternoon</label>
<label><input type="checkbox"> Evening</label>

</div>


<!-- MULTIPLE LOCATION OPTION -->

<div class="section">

<label>
<input type="checkbox" id="multiToggle" onchange="toggleLocations()">
Multiple delivery locations
</label>

</div>


<!-- LOCATION 1 -->

<div class="section">

<h3>Delivery Location</h3>

<input id="location1" type="text" placeholder="Enter delivery location">

</div>


<!-- MULTI LOCATION SECTION -->

<div id="multiSection" class="hidden">


<div class="section">

<h3>Location 1 Days</h3>

<div class="days">

<label><input type="checkbox"> Mon</label>
<label><input type="checkbox"> Tue</label>
<label><input type="checkbox"> Wed</label>
<label><input type="checkbox"> Thu</label>
<label><input type="checkbox"> Fri</label>
<label><input type="checkbox"> Sat</label>

</div>

</div>



<div class="section">

<h3>Location 2</h3>

<input id="location2" type="text" placeholder="Enter second location">

</div>



<div class="section">

<h3>Location 2 Days</h3>

<div class="days">

<label><input type="checkbox"> Mon</label>
<label><input type="checkbox"> Tue</label>
<label><input type="checkbox"> Wed</label>
<label><input type="checkbox"> Thu</label>
<label><input type="checkbox"> Fri</label>
<label><input type="checkbox"> Sat</label>

</div>

</div>

</div>


<button>Generate Quote</button>

</div>


<script>

function selectPlan(card){

document.querySelectorAll(".plan-card").forEach(c=>c.classList.remove("active"));

card.classList.add("active");

}



function toggleLocations(){

let section=document.getElementById("multiSection");

if(document.getElementById("multiToggle").checked){

section.classList.remove("hidden");

}else{

section.classList.add("hidden");

}

}



let autocomplete1;
let autocomplete2;

function initAutocomplete(){

const input1=document.getElementById("location1");
autocomplete1=new google.maps.places.Autocomplete(input1);

const input2=document.getElementById("location2");

if(input2){
autocomplete2=new google.maps.places.Autocomplete(input2);
}

}

</script>


<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB7m4j7B6xMkC1EfS9aekBW-R6CdLatoVE&libraries=places&callback=initAutocomplete" async defer></script>


</body>
</html>

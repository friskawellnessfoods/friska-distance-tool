<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Friska Wellness Quote</title>

<style>

body{
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f7f7f7;
margin:0;
padding:0;
}

.header{
position:sticky;
top:0;
background:white;
padding:16px 0;
display:flex;
justify-content:center;
align-items:center;
border-bottom:1px solid #eee;
box-shadow:0 2px 8px rgba(0,0,0,0.06);
z-index:10;
}

.logo{
height:48px;
max-width:200px;
object-fit:contain;
}

.container{
max-width:480px;
margin:auto;
padding:20px 18px 140px;
}

.section{
margin-top:25px;
}

.plan-card{
border-radius:14px;
overflow:hidden;
cursor:pointer;
border:2px solid #eee;
margin-top:14px;
background:white;
}

.plan-card.active{
border:2px solid #0a1a6e;
}

.plan-card img{
width:100%;
}

label{
display:block;
background:white;
padding:12px;
border-radius:10px;
margin-top:10px;
border:1px solid #eee;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd;
}

button{
margin-top:12px;
width:100%;
padding:14px;
background:#0a1a6e;
color:white;
border:none;
border-radius:10px;
font-size:16px;
}

#quoteResult{
margin-top:22px;
background:white;
padding:22px;
border-radius:14px;
text-align:center;
box-shadow:0 6px 16px rgba(0,0,0,0.06);
}

.bookBar{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:14px;
border-top:1px solid #eee;
box-shadow:0 -3px 10px rgba(0,0,0,0.08);
display:none;
}

.bookBar button{
background:#25D366;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="header">
<img src="logo.png" class="logo">
</div>

<div class="container">

<h2>Get Your Plan Quote</h2>

<div class="section">

<h3>Select Plan</h3>

<div class="plan-card" onclick="selectPlan(this,'nb')">
<img src="nutri_balance.jpeg">
</div>

<div class="plan-card" onclick="selectPlan(this,'hp')">
<img src="high_protein.jpeg">
</div>

</div>

<div class="section">

<h3>Select Meals</h3>

<label><input type="checkbox" id="breakfast"> Breakfast</label>
<label><input type="checkbox" id="lunch"> Lunch</label>
<label><input type="checkbox" id="dinner"> Dinner</label>
<label><input type="checkbox" id="snack"> Snack</label>
<label><input type="checkbox" id="juice1"> 1 Juice</label>
<label><input type="checkbox" id="juice2"> 2 Juices</label>

</div>

<div class="section">

<h3>Duration</h3>

<label><input type="radio" name="duration" value="d"> 2 Day Trial</label>
<label><input type="radio" name="duration" value="w"> 1 Week</label>
<label><input type="radio" name="duration" value="m"> 26 Days</label>
<label><input type="radio" name="duration" value="q"> 3 Months</label>

</div>

<div class="section">

<h3>Delivery Slot</h3>

<label><input type="checkbox" id="morning"> Morning</label>
<label><input type="checkbox" id="afternoon"> Afternoon</label>
<label><input type="checkbox" id="evening"> Evening</label>

</div>

<div class="section">

<h3>Location</h3>

<input id="location1" placeholder="Primary location">

<label>
<input type="checkbox" id="multiLocation" onchange="toggleLocation2()"> Multiple delivery locations
</label>

<div id="location2Block" class="hidden">

<input id="location2" placeholder="Second location">

</div>

</div>

<div class="section">

<label>
<input type="checkbox" id="seafoodCheck" onchange="toggleSeafood()"> Add Seafood
</label>

<div id="seafoodSection" class="hidden">

<label>Seafood days per week</label>
<input id="seafoodDays" type="number" min="1" max="6">

</div>

</div>

<div class="section">

<input id="clientName" placeholder="Name">
<input id="clientPhone" placeholder="Phone">

<button onclick="generateQuote()">Submit</button>

</div>

<div id="quoteResult"></div>

</div>

<div class="bookBar" id="bookBar">
<button onclick="bookNow()">Book Now</button>
</div>

<script>

let selectedPlan=""
let pricing={}
let distance1=0
let distance2=0

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwabaDpd5SRQFYDFl2gStNAQMiLtv1JZIZRRplU7blosoSHi87U6cuWQ7LdNhzNYdo/exec"
const WHATSAPP_NUMBER="918400964170"

fetch(SCRIPT_URL)
.then(r=>r.json())
.then(data=>pricing=data)

function getPrice(k){return Number(pricing[k]||0)}

function selectPlan(card,plan){

document.querySelectorAll(".plan-card").forEach(c=>c.classList.remove("active"))
card.classList.add("active")
selectedPlan=plan

}

function toggleLocation2(){

document.getElementById("location2Block").classList.toggle("hidden")

}

function toggleSeafood(){

document.getElementById("seafoodSection").classList.toggle("hidden")

}

/* DISTANCE */

function getDistance(origin,destination,callback){

let service=new google.maps.DistanceMatrixService()

service.getDistanceMatrix({

origins:[origin],
destinations:[destination],
travelMode:"DRIVING"

},function(response,status){

if(status==="OK"){

let km=response.rows[0].elements[0].distance.value/1000
callback(km)

}

})

}

function generateQuote(){

let name=document.getElementById("clientName").value
let phone=document.getElementById("clientPhone").value

if(!name || phone.length<10){alert("Enter name and phone");return}

let duration=document.querySelector('input[name="duration"]:checked')?.value

if(!duration){alert("Select duration");return}

let days=duration=="d"?2:duration=="w"?6:duration=="m"?26:78

let prefix=selectedPlan=="nb"?"nb_":"hp_"
let dur=duration+"_"

/* FOOD */

let foodPerDay=0

if(breakfast.checked) foodPerDay+=getPrice(prefix+dur+"breakfast")

let meals=0
if(lunch.checked) meals++
if(dinner.checked) meals++

if(meals==1) foodPerDay+=getPrice(prefix+dur+"lunch")
if(meals==2) foodPerDay+=getPrice(prefix+dur+"combo")*2

if(snack.checked) foodPerDay+=getPrice(prefix+dur+"snack")
if(juice1.checked) foodPerDay+=getPrice(prefix+dur+"juice1")
if(juice2.checked) foodPerDay+=getPrice(prefix+dur+"juice2")*2

let foodTotal=foodPerDay*days

/* SEAFOOD */

let seafoodCost=0

if(seafoodCheck.checked){

let perWeek=parseInt(seafoodDays.value||0)

let seafoodDaysTotal=Math.round((perWeek/6)*days)

seafoodCost=seafoodDaysTotal*getPrice("seafood")

}

let foodSubtotal=foodTotal+seafoodCost

/* DELIVERY */

let trips=0
if(morning.checked) trips++
if(afternoon.checked) trips++
if(evening.checked) trips++

let deliveryRate=getPrice("delivery")

let deliveryTotal=(distance1*deliveryRate*trips*days)

/* GST */

let gst=(foodSubtotal)*(getPrice("gst")/100)

let total=foodSubtotal+deliveryTotal+gst

/* SAVE LEAD */

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({

name:name,
phone:phone,
plan:selectedPlan=="nb"?"Nutri Balance":"High Protein",
duration:duration,
location1:location1.value,
location2:location2.value,
price:total

})
})

document.getElementById("quoteResult").innerHTML=

"<div style='font-size:30px;font-weight:700;color:#0a1a6e'>₹"+total.toFixed(0)+"</div>"+
"<div style='font-size:14px;color:#555'>Including delivery & taxes</div>"

document.getElementById("bookBar").style.display="block"

}

/* WHATSAPP */

function bookNow(){

let duration=document.querySelector('input[name="duration"]:checked').value

let durationText={
d:"2 Day Trial",
w:"1 Week",
m:"26 Days",
q:"3 Months"
}[duration]

let planText=selectedPlan=="nb"?"Nutri Balance":"High Protein"

let name=document.getElementById("clientName").value

let msg="Hello Friska Wellness,%0A%0AMy name is "+name+
".%0AI have opted for the "+planText+" plan for "+durationText+
".%0APlease share menu and payment details."

window.open("https://wa.me/"+WHATSAPP_NUMBER+"?text="+msg)

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB7m4j7B6xMkC1EfS9aekBW-R6CdLatoVE&libraries=places"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Friska Wellness Quote</title>

<style>

body{
font-family:system-ui;
background:#f4f6fb;
margin:0;
padding:20px;
display:flex;
justify-content:center;
}

.container{
max-width:420px;
width:100%;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.section{
margin-top:25px;
}

.hidden{
display:none;
}

.plan-card{
border-radius:10px;
overflow:hidden;
cursor:pointer;
border:2px solid transparent;
margin-top:12px;
}

.plan-card img{
width:100%;
display:block;
}

.plan-card.active{
border:2px solid #0a1a6e;
}

label{
display:block;
margin-top:8px;
}

input[type="text"], input[type="tel"]{
width:100%;
padding:10px;
margin-top:8px;
}

#quoteResult{
margin-top:20px;
background:#f8f9ff;
padding:20px;
border-radius:10px;
text-align:center;
}

</style>

</head>


<body>

<div class="container">

<h2>Friska Wellness Quote</h2>


<!-- PLAN -->

<div class="section" id="planSection">

<h3>Select Plan</h3>

<div class="plan-card" onclick="selectPlan(this,'nb')">
<img src="nutri_balance.jpeg">
</div>

<div class="plan-card" onclick="selectPlan(this,'hp')">
<img src="high_protein.jpeg">
</div>

</div>


<!-- MEALS -->

<div class="section hidden" id="mealSection">

<h3>Select Meals</h3>

<label><input type="checkbox" id="breakfast" onchange="checkMeals()"> Breakfast</label>
<label><input type="checkbox" id="lunch" onchange="checkMeals()"> Lunch</label>
<label><input type="checkbox" id="dinner" onchange="checkMeals()"> Dinner</label>
<label><input type="checkbox" id="snack" onchange="checkMeals()"> Snack</label>
<label><input type="checkbox" id="juice1" onchange="checkMeals()"> 1 Juice</label>
<label><input type="checkbox" id="juice2" onchange="checkMeals()"> 2 Juices</label>

</div>


<!-- DURATION -->

<div class="section hidden" id="durationSection">

<h3>Duration</h3>

<label><input type="radio" name="duration" value="d" onchange="checkDuration()"> 1 Day</label>
<label><input type="radio" name="duration" value="w" onchange="checkDuration()"> 1 Week</label>
<label><input type="radio" name="duration" value="m" onchange="checkDuration()"> 26 Days</label>
<label><input type="radio" name="duration" value="q" onchange="checkDuration()"> 3 Months</label>

</div>


<!-- DELIVERY SLOT -->

<div class="section hidden" id="slotSection">

<h3>Delivery Slot</h3>

<label><input type="checkbox" id="morning" onchange="checkSlot()"> Morning</label>
<label><input type="checkbox" id="afternoon" onchange="checkSlot()"> Afternoon</label>
<label><input type="checkbox" id="evening" onchange="checkSlot()"> Evening</label>

</div>


<!-- LOCATION -->

<div class="section hidden" id="locationSection">

<h3>Delivery Location</h3>

<input id="location" type="text" placeholder="Enter delivery location">

</div>


<!-- CONTACT -->

<div class="section hidden" id="contactSection">

<h3>Your Details</h3>

<input type="text" id="clientName" placeholder="Enter your name" oninput="checkContact()">

<input type="tel" id="clientPhone" placeholder="Enter phone number" oninput="checkContact()">

</div>


<div id="quoteResult"></div>

</div>



<script>

let selectedPlan="";
let distance=0;
let leadSent=false;


/* PLAN */

function selectPlan(card,plan){

document.querySelectorAll(".plan-card").forEach(c=>c.classList.remove("active"));

card.classList.add("active");

selectedPlan=plan;

document.getElementById("mealSection").classList.remove("hidden");

}


/* MEALS */

function checkMeals(){

let mealsSelected =
document.getElementById("breakfast").checked ||
document.getElementById("lunch").checked ||
document.getElementById("dinner").checked ||
document.getElementById("snack").checked ||
document.getElementById("juice1").checked ||
document.getElementById("juice2").checked;

if(mealsSelected){

document.getElementById("durationSection").classList.remove("hidden");

}

generateQuote();

}


/* DURATION */

function checkDuration(){

document.getElementById("slotSection").classList.remove("hidden");

generateQuote();

}


/* SLOT */

function checkSlot(){

let slotSelected =
document.getElementById("morning").checked ||
document.getElementById("afternoon").checked ||
document.getElementById("evening").checked;

if(slotSelected){

document.getElementById("locationSection").classList.remove("hidden");

}

generateQuote();

}


/* CONTACT */

function checkContact(){

generateQuote();

}


/* GOOGLE LOCATION */

let autocomplete;

function initAutocomplete(){

const input=document.getElementById("location");

autocomplete=new google.maps.places.Autocomplete(input);

autocomplete.addListener("place_changed",function(){

const place=autocomplete.getPlace();

calculateDistance(place.geometry.location);

});

}


function calculateDistance(destination){

const kitchen={lat:17.452623115758335,lng:78.41967516576499};

const service=new google.maps.DistanceMatrixService();

service.getDistanceMatrix({

origins:[kitchen],
destinations:[destination],
travelMode:"DRIVING"

},function(response,status){

const element=response.rows[0].elements[0];

distance=element.distance.value/1000;

document.getElementById("contactSection").classList.remove("hidden");

generateQuote();

});

}


/* LOAD PRICING */

let pricing=JSON.parse(localStorage.getItem("friskaPricing"));


/* QUOTE */

function generateQuote(){

let name=document.getElementById("clientName").value.trim();
let phone=document.getElementById("clientPhone").value.trim();

if(distance==0 || !name || phone.length!==10){

document.getElementById("quoteResult").innerHTML="";
return;

}

let breakfast=document.getElementById("breakfast").checked;
let lunch=document.getElementById("lunch").checked;
let dinner=document.getElementById("dinner").checked;
let snack=document.getElementById("snack").checked;
let juice1=document.getElementById("juice1").checked;
let juice2=document.getElementById("juice2").checked;

let morning=document.getElementById("morning").checked;
let afternoon=document.getElementById("afternoon").checked;
let evening=document.getElementById("evening").checked;

let duration=document.querySelector('input[name="duration"]:checked').value;

let prefix=selectedPlan=="nb" ? "nb_" : "hp_";
let dur=duration+"_";

let foodPerDay=0;


/* BREAKFAST */

if(breakfast){
foodPerDay+=Number(pricing[prefix+dur+"breakfast"]);
}


/* MEAL */

let mealCount=0;

if(lunch) mealCount++;
if(dinner) mealCount++;

if(mealCount==1){
foodPerDay+=Number(pricing[prefix+dur+"lunch"]);
}

if(mealCount==2){
foodPerDay+=Number(pricing[prefix+dur+"combo"])*2;
}


/* SNACK */

if(snack){
foodPerDay+=Number(pricing[prefix+dur+"snack"]);
}


/* JUICES */

if(juice1){
foodPerDay+=Number(pricing[prefix+dur+"juice1"]);
}

if(juice2){
foodPerDay+=Number(pricing[prefix+dur+"juice2"])*2;
}


/* DAYS */

let days=1;

if(duration=="w") days=6;
if(duration=="m") days=26;
if(duration=="q") days=78;

let foodTotal=foodPerDay*days;


/* DELIVERY */

let trips=0;

if(morning) trips++;
if(afternoon) trips++;
if(evening) trips++;

let roundedDistance=Math.round(distance);

let deliveryPerTrip=roundedDistance*Number(pricing.delivery);

let deliveryTotal=deliveryPerTrip*trips*days;


/* GST */

let gst=foodTotal*(pricing.gst/100);


/* TOTAL */

let total=foodTotal+gst+deliveryTotal;


/* DISPLAY PRICE */

document.getElementById("quoteResult").innerHTML=

"<div style='font-size:28px;font-weight:700;color:#0a1a6e'>₹"+total.toFixed(0)+"</div>"+
"<div style='font-size:14px;margin-top:6px;color:#555'>Including delivery charges & taxes</div>";



/* SAVE LEAD */

if(!leadSent){

leadSent=true;

let meals=[];
if(breakfast) meals.push("Breakfast");
if(lunch) meals.push("Lunch");
if(dinner) meals.push("Dinner");
if(snack) meals.push("Snack");
if(juice1) meals.push("1 Juice");
if(juice2) meals.push("2 Juices");

let slots=[];
if(morning) slots.push("Morning");
if(afternoon) slots.push("Afternoon");
if(evening) slots.push("Evening");

fetch("https://script.google.com/macros/s/AKfycbzbQCn5EleZYDyDeNsYG8JwV0IjxyZMzYu0qBbgz0DTw2YDwuE3xWW8CrtW_wZxEMo/exec",{

method:"POST",

body:JSON.stringify({

name:name,
phone:phone,
plan:selectedPlan=="nb" ? "Nutri Balance":"High Protein",
meals:meals.join(", "),
duration:duration,
slots:slots.join(", "),
location:document.getElementById("location").value,
distance:roundedDistance,
price:total

})

});

}

}

</script>


<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB7m4j7B6xMkC1EfS9aekBW-R6CdLatoVE&libraries=places&callback=initAutocomplete" async defer></script>

</body>
</html>

\<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Friska Meal Quote</title>

<style>

body{
font-family:system-ui;
background:#f4f6fb;
margin:0;
padding:20px;
display:flex;
justify-content:center;
}

.container{
max-width:520px;
width:100%;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.section{
margin-top:25px;
}

.plan-grid{
display:flex;
gap:15px;
}

.plan-card{
flex:1;
border-radius:10px;
overflow:hidden;
cursor:pointer;
border:2px solid transparent;
}

.plan-card img{
width:100%;
display:block;
}

.plan-card.active{
border:2px solid #0a1a6e;
}

label{
display:block;
margin-top:8px;
}

input[type="text"]{
width:100%;
padding:10px;
margin-top:8px;
}

button{
margin-top:25px;
width:100%;
padding:14px;
background:#0a1a6e;
color:white;
border:none;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

#quoteResult{
margin-top:20px;
font-size:18px;
font-weight:600;
}

</style>

</head>

<body>

<div class="container">

<h2>Friska Wellness Quote</h2>

<!-- PLAN -->

<div class="section">

<h3>Select Plan</h3>

<div class="plan-grid">

<div class="plan-card" onclick="selectPlan(this,'nb')">
<img src="nutri_balance.jpeg">
</div>

<div class="plan-card" onclick="selectPlan(this,'hp')">
<img src="high_protein.jpeg">
</div>

</div>

</div>

<!-- MEALS -->

<div class="section">

<h3>Select Meals</h3>

<label><input type="checkbox" id="breakfast"> Breakfast</label>
<label><input type="checkbox" id="lunch"> Lunch</label>
<label><input type="checkbox" id="dinner"> Dinner</label>
<label><input type="checkbox" id="snack"> Snack</label>
<label><input type="checkbox" id="juice1"> 1 Juice</label>
<label><input type="checkbox" id="juice2"> 2 Juices</label>

</div>

<!-- DURATION -->

<div class="section">

<h3>Duration</h3>

<label><input type="radio" name="duration" value="d"> 1 Day</label>
<label><input type="radio" name="duration" value="w"> 1 Week</label>
<label><input type="radio" name="duration" value="m"> 26 Days</label>
<label><input type="radio" name="duration" value="q"> 3 Months</label>

</div>

<!-- DELIVERY SLOT -->

<div class="section">

<h3>Delivery Slot</h3>

<label><input type="checkbox" id="morning"> Morning</label>
<label><input type="checkbox" id="afternoon"> Afternoon</label>
<label><input type="checkbox" id="evening"> Evening</label>

</div>

<!-- LOCATION -->

<div class="section">

<h3>Delivery Location</h3>

<input id="location" type="text" placeholder="Enter delivery location">

</div>

<button onclick="generateQuote()">Generate Quote</button>

<div id="quoteResult"></div>

</div>


<script>

let selectedPlan="";
let distance=0;

/* PLAN SELECT */

function selectPlan(card,plan){

document.querySelectorAll(".plan-card").forEach(c=>c.classList.remove("active"));

card.classList.add("active");

selectedPlan=plan;

}


/* LOAD PRICING */

let pricing=JSON.parse(localStorage.getItem("friskaPricing"));

if(!pricing){

alert("Please configure pricing in admin.html");

}


/* AUTOCOMPLETE */

let autocomplete;

function initAutocomplete(){

const input=document.getElementById("location");

autocomplete=new google.maps.places.Autocomplete(input);

autocomplete.addListener("place_changed",function(){

const place=autocomplete.getPlace();

calculateDistance(place.geometry.location);

});

}


/* DISTANCE */

function calculateDistance(destination){

const kitchen={lat:17.452623115758335,lng:78.41967516576499};

const service=new google.maps.DistanceMatrixService();

service.getDistanceMatrix({

origins:[kitchen],
destinations:[destination],
travelMode:"DRIVING"

},function(response,status){

const element=response.rows[0].elements[0];

distance=element.distance.value/1000;

});

}


/* QUOTE */

function generateQuote(){

let breakfast=document.getElementById("breakfast").checked;
let lunch=document.getElementById("lunch").checked;
let dinner=document.getElementById("dinner").checked;
let snack=document.getElementById("snack").checked;
let juice1=document.getElementById("juice1").checked;
let juice2=document.getElementById("juice2").checked;

let morning=document.getElementById("morning").checked;
let afternoon=document.getElementById("afternoon").checked;
let evening=document.getElementById("evening").checked;

let duration=document.querySelector('input[name="duration"]:checked').value;

let prefix=selectedPlan+"_";
let dur=duration+"_";

let foodPerDay=0;

/* BREAKFAST */

if(breakfast){

foodPerDay+=Number(pricing[prefix+dur+"breakfast"]);

}

/* LUNCH DINNER */

let mealCount=0;

if(lunch) mealCount++;

if(dinner) mealCount++;

if(mealCount==1){

foodPerDay+=Number(pricing[prefix+dur+"meal"]);

}

if(mealCount==2){

foodPerDay+=Number(pricing[prefix+dur+"combo"])*2;

}

/* SNACK */

if(snack){

foodPerDay+=Number(pricing[prefix+dur+"snack"]);

}

/* JUICES */

if(juice1){

foodPerDay+=Number(pricing[prefix+dur+"juice1"]);

}

if(juice2){

foodPerDay+=Number(pricing[prefix+dur+"juice2"])*2;

}

/* DAYS */

let days=1;

if(duration=="w") days=6;

if(duration=="m") days=26;

if(duration=="q") days=78;

let foodTotal=foodPerDay*days;

/* DELIVERY */

let trips=0;

if(morning) trips++;

if(afternoon) trips++;

if(evening) trips++;

let deliveryPerTrip=distance*pricing.delivery;

let deliveryTotal=deliveryPerTrip*trips*days;

/* GST */

let gst=foodTotal*(pricing.gst/100);

/* FINAL */

let total=foodTotal+gst+deliveryTotal;

document.getElementById("quoteResult").innerHTML=

"Distance: "+distance.toFixed(1)+" km"+
"<br>Food: ₹"+foodTotal+
"<br>GST: ₹"+gst.toFixed(2)+
"<br>Delivery: ₹"+deliveryTotal.toFixed(2)+
"<br><b>Total: ₹"+total.toFixed(2)+"</b>";

}

</script>


<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB7m4j7B6xMkC1EfS9aekBW-R6CdLatoVE&libraries=places&callback=initAutocomplete" async defer></script>

</body>
</html>
